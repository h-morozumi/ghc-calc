name: Sync pricing from Azure Retail Prices API

on:
  schedule:
    # Run on the 1st–3rd of each month at 03:00 UTC. The wide window is
    # insurance against GitHub Actions' scheduled-run delays/skips.
    - cron: "0 3 1-3 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync pricing
        run: pnpm sync:pricing

      - name: Run tests
        run: pnpm test

      - name: Ensure PR body exists
        if: success()
        run: |
          if [ ! -f pricing-sync-body.md ]; then
            echo "No pricing changes detected." > pricing-sync-body.md
          fi

      - name: Create Pull Request
        if: success()
        uses: peter-evans/create-pull-request@v7
        with:
          branch: bot/pricing-sync
          title: "chore(pricing): monthly Azure Retail Prices sync"
          commit-message: "chore(pricing): monthly Azure Retail Prices sync"
          add-paths: src/data/pricing.json
          body-path: pricing-sync-body.md
